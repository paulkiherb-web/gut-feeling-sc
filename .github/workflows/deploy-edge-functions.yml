name: Deploy Edge Function to Deno Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install deployctl
        run: deno install -gArf jsr:@deno/deployctl

      - name: Deploy analyze-food to Deno Deploy
        run: |
          deployctl deploy \
            --project=boosta-analyze-food \
            --entrypoint=supabase/functions/analyze-food/index.ts \
            --env=LOVABLE_API_KEY=${{ secrets.LOVABLE_API_KEY }} \
            --token=${{ secrets.DENO_DEPLOY_TOKEN }}
