name: Deploy Edge Function to Deno Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy analyze-food to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: boosta-analyze-food
          entrypoint: supabase/functions/analyze-food/index.ts
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
