name: Deploy Edge Function to Deno Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install deployctl
        run: deno install -gArf jsr:@deno/deployctl

      - name: Deploy analyze-food to Deno Deploy
        run: |
          deployctl deploy \
            --project=boosta-analyze-food \
            --entrypoint=supabase/functions/analyze-food/index.ts \
            --env=AI_API_KEY=${{ secrets.AI_API_KEY }} \
            --env=AI_GATEWAY_URL=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions \
            --token=${{ secrets.DENO_DEPLOY_TOKEN }}
